<!DOCTYPE html>
<html>
<head>
    <title>EcoRoute | Register</title>
    <script src="{{ url_for('static', filename='language.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body class="green-state">
    <div class="bg-layer green-bg" style="opacity: 1;"></div>
    <div class="container">
        <div class="card">
            <h1>🌿 Create <span>Account</span></h1>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div style="margin-bottom: 15px;">
                  {% for msg in messages %}
                    <div class="flash-msg" style="background:#1e293b; padding:10px; border-radius:8px; margin-bottom:5px; color: #fff; font-size: 0.9rem; text-align: left;">
                      {{ msg }}
                    </div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="/register" method="POST" onsubmit="return validateForm()">
                <input type="email" name="username" placeholder="Enter Gmail ID" required autocomplete="email">
                
                <input type="password" id="password" name="password" placeholder="Password" required>
                
                <input type="password" id="confirm_password" placeholder="Confirm Password" required>
                
                <button type="submit" class="submit-btn">Register</button>
            </form>
            <div class="signup">Already have an account? <a href="/">Login</a></div>
        </div>
    </div>

    <script>
    function validateForm() {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;
        
        if (password !== confirmPassword) {
            alert("❌ Passwords do not match! Please check and try again.");
            return false;
        }
        return true;
    }
    </script>
</body>
</html>
