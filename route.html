<!DOCTYPE html>
<html lang="en">
<head>
    <script src="{{ url_for('static', filename='language.js') }}"></script>
    <meta charset="UTF-8">
    <title>EcoRoute | Trip Calculation</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Panel for Trip Summary and Route Options */
        .route-panel { 
            position: absolute; top: 20px; right: 20px; z-index: 1000; 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 320px; 
        }
        .route-option { margin: 15px 0; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .eco { color: #2ecc71; font-weight: bold; border-left: 5px solid #2ecc71; padding-left: 10px; }
        .reg { color: #e74c3c; font-weight: bold; border-left: 5px solid #e74c3c; padding-left: 10px; }
        .select-btn { 
            margin-top: 8px; width: 100%; padding: 8px; cursor: pointer; 
            border-radius: 5px; border: 1px solid #ccc; background: #f9f9f9; font-weight: bold; 
        }
        
        #selection-modal { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; 
        }
        .modal-content { background:white; padding:30px; border-radius:15px; text-align:center; width:90%; max-width:400px; }
        
        #nav-dashboard { 
            display:none; position:absolute; bottom:20px; left:20px; right:20px; 
            z-index:1000; background:white; padding:15px; border-radius:12px; 
            box-shadow:0 4px 15px rgba(0,0,0,0.3); 
        }
        .stats-row { display: flex; justify-content: space-around; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .stat-val { font-weight: bold; font-size: 18px; color: #1b4d16; }
    </style>
</head>
<body>
    <h1 data-i18n="project_name" style="display:none;">EcoRoute</h1>
    <input type="hidden" id="start" data-i18n="placeholder_start">
    <input type="hidden" id="end" data-i18n="placeholder_end">

    <div id="map" style="height: 100vh; width: 100%;"></div>
    
    <div class="route-panel" id="main-panel">
        <h2 style="color: #1b4d16; margin: 0 0 10px 0;" data-i18n="project_desc">Trip Summary</h2>
        <p><strong data-i18n="start_loc">From:</strong> <span id="start-name">...</span></p>
        <p><strong data-i18n="dest_city">To:</strong> <span id="end-name">...</span></p>
        <p><strong data-i18n="vehicle_type">Vehicle:</strong> <span id="veh-type">...</span></p>
        <hr>
        
        <div class="route-option">
            <div class="eco" id="eco-label" data-i18n="green_route">Green Route: Calculating...</div>
            <button class="select-btn" onclick="handleSelection('green')" data-i18n="find_route_btn">Select Green Route</button>
        </div>
        <div class="route-option">
            <div class="reg" id="reg-label" data-i18n="red_route">Red Route: Calculating...</div>
            <button class="select-btn" onclick="handleSelection('red')" data-i18n="find_route_btn">Select Red Route</button>
        </div>
        
        <button onclick="window.location.href='/index'" style="width: 100%; padding: 10px; cursor: pointer; background: #1b4d16; color: white; border: none; border-radius: 8px;" data-i18n="nav_home">New Search</button>
    </div>

    <div id="selection-modal">
        <div class="modal-content">
            <div id="modal-icon" style="font-size:50px; margin-bottom:15px;">🌱</div>
            <h3 id="modal-title" style="color:#1b4d16;" data-i18n="following_road">Route Selected</h3>
            <p id="modal-msg"></p>
            <button onclick="startLiveNavigation()" style="width:100%; padding:12px; background:#2ecc71; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;" data-i18n="find_optimal_btn">🚀 Start Navigation</button>
            <button onclick="document.getElementById('selection-modal').style.display='none'" style="width:100%; padding:10px; background:#eee; border:none; border-radius:8px; margin-top:10px;">Change Route</button>
        </div>
    </div>

    <div id="nav-dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:bold; color:#2ecc71;">● Navigation Active</span>
            <button onclick="stopNavigation()" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
        <div class="stats-row">
            <div class="stat-box"><div data-i18n="distance">Distance</div><div id="live-dist" class="stat-val">-- km</div></div>
            <div class="stat-box"><div data-i18n="duration">Remaining</div><div id="live-time" class="stat-val">-- min</div></div>
            <div class="stat-box"><div>Speed</div><div id="live-speed" class="stat-val">0 km/h</div></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="{{ url_for('static', filename='route.js') }}"></script>
</body>
</html>
